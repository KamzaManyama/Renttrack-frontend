<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RentTrack — Sign In</title>
<link rel="stylesheet" href="style.css" />
<script src="env.js"></script>
</head>
<body>

<div class="login-page">

  <!-- Brand panel -->
  <div class="login-brand" style="order:2">
    <svg width="64" height="50" viewBox="0 0 50 39" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M16.4992 2H37.5808L22.0816 24.9729H1L16.4992 2Z" fill="rgba(255,255,255,0.9)"/>
      <path d="M17.4224 27.102L11.4192 36H33.5008L49 13.0271H32.7024L23.2064 27.102H17.4224Z" fill="rgba(255,255,255,0.6)"/>
    </svg>
    <div class="login-brand-text">
      <h1 id="brand-name">RentTrack</h1>
      <p>Property maintenance, simplified.</p>
    </div>
    <div style="position:relative;z-index:1;text-align:center;margin-top:32px">
      <div style="display:flex;flex-direction:column;gap:14px;max-width:260px">
        <div style="background:rgba(255,255,255,.1);border-radius:12px;padding:14px 18px;color:white;text-align:left">
          <div style="font-size:11px;opacity:.6;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Tenants</div>
          <div style="font-size:13px;opacity:.85">Log tickets, track progress, view your unit</div>
        </div>
        <div style="background:rgba(255,255,255,.1);border-radius:12px;padding:14px 18px;color:white;text-align:left">
          <div style="font-size:11px;opacity:.6;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Caretakers</div>
          <div style="font-size:13px;opacity:.85">Manage jobs, update statuses, view schedules</div>
        </div>
        <div style="background:rgba(255,255,255,.1);border-radius:12px;padding:14px 18px;color:white;text-align:left">
          <div style="font-size:11px;opacity:.6;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Managers</div>
          <div style="font-size:13px;opacity:.85">Full oversight — users, reports, properties</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Login panel -->
  <div class="login-panel" style="order:1">
    <div class="login-box">

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:36px">
        <svg width="36" height="28" viewBox="0 0 50 39" fill="none">
          <path d="M16.4992 2H37.5808L22.0816 24.9729H1L16.4992 2Z" fill="#007AFF"/>
          <path d="M17.4224 27.102L11.4192 36H33.5008L49 13.0271H32.7024L23.2064 27.102H17.4224Z" fill="#312ECB"/>
        </svg>
        <span id="app-name-logo" style="font-size:20px;font-weight:800;letter-spacing:-.3px">RentTrack</span>
      </div>

      <h2>Welcome back</h2>
      <p class="sub">Sign in to your account to continue.</p>

      <form id="login-form" novalidate onsubmit="return false">
        <div class="form-grid" style="gap:18px">

          <div class="form-group">
            <label>Email Address</label>
            <input type="text" id="email" placeholder="you@example.com" autocomplete="email" />
            <span class="err" id="email-err"></span>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="pw-wrap">
              <input type="password" id="password" placeholder="Your password" autocomplete="current-password" />
              <button type="button" class="pw-toggle" onclick="togglePw()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="err" id="pw-err"></span>
          </div>

          <div id="api-error" style="display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:13px;color:#b91c1c"></div>

          <button type="button" id="login-btn" class="btn btn-primary" onclick="doLogin()" style="width:100%;justify-content:center;padding:12px">
            Sign In
          </button>
        </div>
      </form>

      <p style="margin-top:28px;font-size:12px;color:var(--muted);text-align:center">
        Powered by <strong>RentTrack</strong> · <span id="slug-display" style="font-family:'JetBrains Mono',monospace;font-size:11px"></span>
      </p>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast toast--success">
  <svg class="toast__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
  <span class="toast__msg"></span>
</div>

<script src="app.js"></script>
<script>
// Apply env
document.getElementById('brand-name').textContent    = ENV.APP_NAME || 'RentTrack';
document.getElementById('app-name-logo').textContent = ENV.APP_NAME || 'RentTrack';
document.getElementById('slug-display').textContent  = SLUG ? `slug: ${SLUG}` : 'no slug set';
document.title = `${ENV.APP_NAME || 'RentTrack'} — Sign In`;

// Redirect if already logged in
if (Auth.isLoggedIn()) {
  const role = Auth.user?.role;
  redirect(role);
}

function redirect(role) {
  if (role === 'tenant') { window.location.href = 'tenant.html'; return; }
  // manager, maintenance_admin, technician → caretaker dashboard
  window.location.href = 'caretaker.html';
}

function togglePw() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function clearErrors() {
  ['email','password'].forEach(id => {
    document.getElementById(id).classList.remove('error');
    document.getElementById(`${id === 'password' ? 'pw' : id}-err`).classList.remove('show');
  });
  document.getElementById('api-error').style.display = 'none';
}

function showFieldError(field, msg) {
  const inp = document.getElementById(field);
  const err = document.getElementById(`${field === 'password' ? 'pw' : field}-err`);
  inp.classList.add('error');
  err.textContent = msg;
  err.classList.add('show');
}

async function doLogin() {
  clearErrors();
  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('password').value;
  let valid   = true;

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showFieldError('email', 'Enter a valid email address.'); valid = false;
  }
  if (!pw) {
    showFieldError('password', 'Password is required.'); valid = false;
  }
  if (!valid) return;

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span> Signing in…`;

  try {
    const data = await POST('/api/auth/login', { email, password: pw });
    Auth.set(data.token, data.user);
    redirect(data.user.role);
  } catch (e) {
    const box = document.getElementById('api-error');
    box.style.display = 'block';
    box.textContent = e.message;
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Sign In';
  }
}

// Enter key
document.getElementById('login-form').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
