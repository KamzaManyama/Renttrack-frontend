<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | RentTrack</title>
  <script src="env.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/forgot-password.css">
</head>
<body>

<div class="forgot-wrap">

  <!-- Hero Section -->
  <div class="forgot-hero">
    <img
      src="https://i.pinimg.com/736x/9f/74/63/9f7463fb812935ea8ac1b97707d5403d.jpg"
      alt=""
      loading="eager"
    >
  </div>

  <!-- Form Panel -->
  <div class="forgot-panel">
    <div class="forgot-panel-inner">
      
      <!-- Brand -->
      <div class="forgot-brand">
        <svg width="45" height="36" viewBox="0 0 50 39" fill="none">
          <path d="M16.4992 2H37.5808L22.0816 24.9729H1L16.4992 2Z" fill="#007AFF"/>
          <path d="M17.4224 27.102L11.4192 36H33.5008L49 13.0271H32.7024L23.2064 27.102H17.4224Z" fill="#312ECB"/>
        </svg>
        <span class="forgot-brand-name">RentTrack</span>
      </div>

      <!-- Heading -->
      <div class="forgot-heading">
        <h1>Reset password</h1>
        <p>Enter your email address and we'll send you a link to reset your password.</p>
      </div>

      <!-- Alert Messages -->
      <div class="alert alert-success" id="success-alert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span id="success-message"></span>
      </div>
      
      <div class="alert alert-error" id="error-alert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="error-message"></span>
      </div>

      <!-- Form -->
      <form id="forgot-form" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-input"
            placeholder="you@example.com"
            autocomplete="email" spellcheck="false">
          <span class="field-error" id="email-error">Please enter a valid email address.</span>
        </div>

        <button type="submit" class="btn-primary" id="reset-btn">
          Send reset link
        </button>

        <a href="login.html" class="btn-secondary" id="back-to-login">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Back to sign in
        </a>
      </form>

      <!-- Footer -->
      <div class="forgot-footer">
        <div>Property Management System</div>
        <div class="slug-pill">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span id="slug-text">Loading…</span>
        </div>
      </div>
      
    </div>
  </div>
</div>

<script src="javascript/authentication/forgot-pass.js"></script>

</body>
</html>
