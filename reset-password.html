<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | RentTrack</title>
  <script src="env.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/reset-password.css">
</head>
<body>

<div class="reset-wrap">

  <!-- Hero Section -->
  <div class="reset-hero">
    <img
      src="https://i.pinimg.com/736x/e9/b0/fb/e9b0fb9cef148ed779e3d86467a952ce.jpg"
      alt=""
      loading="eager"
    >
  </div>

  <!-- Form Panel -->
  <div class="reset-panel">
    <div class="reset-panel-inner">
      
      <!-- Brand -->
      <div class="reset-brand">
        <svg width="45" height="36" viewBox="0 0 50 39" fill="none">
          <path d="M16.4992 2H37.5808L22.0816 24.9729H1L16.4992 2Z" fill="#007AFF"/>
          <path d="M17.4224 27.102L11.4192 36H33.5008L49 13.0271H32.7024L23.2064 27.102H17.4224Z" fill="#312ECB"/>
        </svg>
        <span class="reset-brand-name">RentTrack</span>
      </div>

      <!-- Heading -->
      <div class="reset-heading">
        <h1>Create new password</h1>
        <p>Please enter your new password below.</p>
      </div>

      <!-- Alert Messages -->
      <div class="alert alert-success" id="success-alert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span id="success-message"></span>
      </div>
      
      <div class="alert alert-error" id="error-alert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="error-message"></span>
      </div>

      <!-- Form -->
      <form id="reset-form" novalidate>
        <!-- Hidden token field (will be populated from URL) -->
        <input type="hidden" id="token" name="token">
        
        <div class="form-group">
          <label for="password">New Password</label>
          <div class="pw-wrap">
            <input type="password" id="password" class="form-input"
              placeholder="Enter new password"
              autocomplete="new-password">
            <button type="button" class="pw-toggle" id="pw-toggle-1" aria-label="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="password-strength" id="password-strength">
            <div class="strength-bar" id="strength-1"></div>
            <div class="strength-bar" id="strength-2"></div>
            <div class="strength-bar" id="strength-3"></div>
            <div class="strength-bar" id="strength-4"></div>
            <span class="strength-text" id="strength-text">Weak</span>
          </div>
          <span class="field-error" id="password-error">Password must be at least 8 characters.</span>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <div class="pw-wrap">
            <input type="password" id="confirm-password" class="form-input"
              placeholder="Confirm your password"
              autocomplete="new-password">
            <button type="button" class="pw-toggle" id="pw-toggle-2" aria-label="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="confirm-error">Passwords do not match.</span>
        </div>

        <button type="submit" class="btn-primary" id="reset-btn">
          Reset password
        </button>
      </form>

      <!-- Footer -->
      <div class="reset-footer">
        <div>Property Management System</div>
        <div class="slug-pill">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span id="slug-text">Loading…</span>
        </div>
      </div>
      
    </div>
  </div>
</div>

<script src="javascript/authentication/reset-password.js"></script>

</body>
</html>
